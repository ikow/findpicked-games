<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gomoku — Five in a Row</title>
<meta name="description" content="Play Gomoku free online. Get five stones in a row to win. Challenge the AI or play with a friend.">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:#fafafa;color:#1d1d1f;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;min-height:100dvh;overflow-x:hidden}
a.back{position:fixed;top:16px;left:16px;color:#6e6e73;text-decoration:none;font-size:15px;z-index:9999}
a.back:hover{color:#1d1d1f}
h1{font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-top:56px}
.sub{font-size:14px;color:#6e6e73;margin-top:4px}
.rules-toggle{display:inline-block;margin-top:8px;font-size:13px;color:#0071e3;cursor:pointer;border:none;background:none;font-family:inherit;padding:0}
.rules-toggle:hover{text-decoration:underline}
.rules-panel{max-height:0;overflow:hidden;transition:max-height 0.3s ease;font-size:13px;color:#6e6e73;line-height:1.6;text-align:left;max-width:400px;margin:4px auto 0}
.rules-panel.open{max-height:300px}
.rules-panel ul{margin:6px 0 0 16px}
.rules-panel li{margin-bottom:3px}
.controls{display:flex;gap:8px;margin:16px 0 12px;flex-wrap:wrap;justify-content:center}
.btn{padding:8px 18px;border-radius:100px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn-primary{background:#0071e3;color:#fff}
.btn-primary:hover{opacity:0.85}
.btn-secondary{background:#f5f5f7;color:#6e6e73}
.btn-secondary:hover{background:#e8e8ed}
.btn-secondary.active{background:#0071e3;color:#fff}
.status{font-size:15px;font-weight:500;margin-bottom:8px;min-height:24px}
.status .dot{display:inline-block;width:12px;height:12px;border-radius:50%;vertical-align:middle;margin-right:6px;border:1px solid #ccc}
.status .dot.black{background:#1d1d1f;border-color:#1d1d1f}
.status .dot.white{background:#fff;border-color:#bbb}
canvas{border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,0.1);cursor:pointer;touch-action:none;max-width:calc(100vw - 32px)}
.stats{display:flex;gap:24px;margin-top:16px;font-size:13px;color:#6e6e73}
.stats span{font-weight:600;color:#1d1d1f}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s}
.overlay.show{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:20px;padding:32px;text-align:center;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.2);transform:scale(0.9);transition:transform 0.3s}
.overlay.show .modal{transform:scale(1)}
.modal h2{font-size:24px;font-weight:700;margin-bottom:8px}
.modal p{font-size:15px;color:#6e6e73;margin-bottom:20px}
.modal .btn{display:block;width:100%;padding:14px;font-size:16px;margin-top:8px}
@media(max-width:480px){h1{font-size:22px;margin-top:48px}.controls{gap:6px}.btn{padding:6px 14px;font-size:12px}}
</style>
</head>
<body>
<a class="back" href="../">← Back</a>
<h1>Gomoku</h1>
<p class="sub" id="turnText"></p>
<button class="rules-toggle" onclick="this.nextElementSibling.classList.toggle('open')">How to Play ▾</button>
<div class="rules-panel">
<ul>
<li>Players take turns placing black and white stones</li>
<li>First to get 5 in a row (horizontal, vertical, or diagonal) wins</li>
<li>Black always goes first</li>
<li>In AI mode, choose your difficulty and which color to play</li>
</ul>
</div>
<div class="controls">
  <button class="btn btn-secondary active" id="btnPvP" onclick="setMode('pvp')">vs Player</button>
  <button class="btn btn-secondary" id="btnAI" onclick="setMode('ai')">vs AI</button>
  <select id="diffSel" style="display:none;padding:6px 12px;border-radius:100px;border:1px solid #e0e0e0;font-size:13px;font-family:inherit;background:#fff;color:#1d1d1f">
    <option value="1">Easy</option><option value="2" selected>Medium</option><option value="3">Hard</option>
  </select>
  <select id="colorSel" style="display:none;padding:6px 12px;border-radius:100px;border:1px solid #e0e0e0;font-size:13px;font-family:inherit;background:#fff;color:#1d1d1f">
    <option value="1">Play Black</option><option value="2">Play White</option>
  </select>
  <button class="btn btn-secondary" onclick="undo()">Undo</button>
  <button class="btn btn-primary" onclick="newGame()">New Game</button>
</div>
<div class="status" id="status"></div>
<canvas id="board"></canvas>
<div class="stats">Wins: <span id="wins">0</span> &nbsp; Losses: <span id="losses">0</span> &nbsp; Draws: <span id="draws">0</span></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="resultTitle"></h2>
    <p id="resultMsg"></p>
    <button class="btn btn-primary" onclick="newGame();hideOverlay()">Play Again</button>
    <button class="btn btn-secondary" onclick="hideOverlay()">Close</button>
  </div>
</div>

<script>
(function(){
'use strict';
const SIZE = 15, EMPTY = 0, BLACK = 1, WHITE = 2;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let grid, history, turn, gameOver, winner, winLine, mode, diff, playerColor, animStones;
let cellSize, padding, boardPx;

// Stats
const STATS_KEY = 'gomoku-stats';
let stats = JSON.parse(localStorage.getItem(STATS_KEY) || '{"w":0,"l":0,"d":0}');
function saveStats(){ localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }
function updateStatsUI(){ document.getElementById('wins').textContent=stats.w; document.getElementById('losses').textContent=stats.l; document.getElementById('draws').textContent=stats.d; }

function setMode(m){
  mode = m;
  document.getElementById('btnPvP').classList.toggle('active', m==='pvp');
  document.getElementById('btnAI').classList.toggle('active', m==='ai');
  document.getElementById('diffSel').style.display = m==='ai'?'inline':'none';
  document.getElementById('colorSel').style.display = m==='ai'?'inline':'none';
  newGame();
}
window.setMode = setMode;

function newGame(){
  grid = Array.from({length:SIZE},()=>Array(SIZE).fill(EMPTY));
  history = []; turn = BLACK; gameOver = false; winner = 0; winLine = null; animStones = [];
  diff = parseInt(document.getElementById('diffSel').value);
  playerColor = parseInt(document.getElementById('colorSel').value);
  updateStatus(); draw();
  if(mode==='ai' && playerColor===WHITE) setTimeout(aiMove, 300);
}
window.newGame = newGame;

function undo(){
  if(gameOver || history.length===0) return;
  const rem = mode==='ai' ? 2 : 1;
  for(let i=0;i<rem && history.length>0;i++){
    const m=history.pop(); grid[m.r][m.c]=EMPTY;
  }
  turn = history.length%2===0 ? BLACK : WHITE;
  winLine=null; winner=0; gameOver=false;
  updateStatus(); draw();
}
window.undo = undo;

function updateStatus(){
  const el = document.getElementById('turnText');
  if(gameOver){
    el.textContent = winner ? (winner===BLACK?'Black':'White')+' wins!' : 'Draw!';
  } else {
    const name = turn===BLACK?'Black':'White';
    const isAI = mode==='ai' && turn!==playerColor;
    el.innerHTML = '<span class="dot '+(turn===BLACK?'black':'white')+'"></span> '+name+(isAI?' (AI thinking...)':'')+"'s turn";
  }
}

// Resize
function resize(){
  const maxW = Math.min(window.innerWidth - 32, 560);
  const dpr = window.devicePixelRatio || 1;
  cellSize = Math.floor(maxW / (SIZE + 1));
  padding = cellSize;
  boardPx = cellSize * (SIZE - 1) + padding * 2;
  canvas.style.width = boardPx + 'px';
  canvas.style.height = boardPx + 'px';
  canvas.width = boardPx * dpr;
  canvas.height = boardPx * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  draw();
}
window.addEventListener('resize', resize);

// Draw
function draw(){
  const W = boardPx;
  ctx.clearRect(0,0,W,W);
  // Board bg
  ctx.fillStyle = '#f0ebe3';
  ctx.beginPath();
  ctx.roundRect(0,0,W,W,12);
  ctx.fill();
  // Grid
  ctx.strokeStyle = '#c4a882';
  ctx.lineWidth = 1;
  for(let i=0;i<SIZE;i++){
    const p = padding + i*cellSize;
    ctx.beginPath(); ctx.moveTo(padding,p); ctx.lineTo(padding+(SIZE-1)*cellSize,p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p,padding); ctx.lineTo(p,padding+(SIZE-1)*cellSize); ctx.stroke();
  }
  // Star points
  ctx.fillStyle = '#c4a882';
  const stars = SIZE===15 ? [[3,3],[3,11],[7,7],[11,3],[11,11]] : [];
  for(const [r,c] of stars){
    ctx.beginPath(); ctx.arc(padding+c*cellSize, padding+r*cellSize, 3, 0, Math.PI*2); ctx.fill();
  }
  // Stones
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    if(grid[r][c]!==EMPTY) drawStone(r,c,grid[r][c],1);
  }
  // Win line
  if(winLine){
    ctx.strokeStyle = 'rgba(0,113,227,0.6)';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(padding+winLine[0][1]*cellSize, padding+winLine[0][0]*cellSize);
    ctx.lineTo(padding+winLine[winLine.length-1][1]*cellSize, padding+winLine[winLine.length-1][0]*cellSize);
    ctx.stroke();
  }
}

function drawStone(r,c,color,scale){
  const x = padding+c*cellSize, y = padding+r*cellSize;
  const rad = cellSize*0.42*scale;
  if(color===BLACK){
    const g = ctx.createRadialGradient(x-rad*0.3,y-rad*0.3,rad*0.1,x,y,rad);
    g.addColorStop(0,'#4a4a4a'); g.addColorStop(1,'#1a1a1a');
    ctx.fillStyle = g;
  } else {
    const g = ctx.createRadialGradient(x-rad*0.3,y-rad*0.3,rad*0.1,x,y,rad);
    g.addColorStop(0,'#ffffff'); g.addColorStop(1,'#e0e0e0');
    ctx.fillStyle = g;
  }
  ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fill();
  // Shadow
  ctx.strokeStyle = color===BLACK?'rgba(0,0,0,0.3)':'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,'+(color===BLACK?'0.15':'0.5')+')';
  ctx.beginPath(); ctx.arc(x-rad*0.25,y-rad*0.25,rad*0.2,0,Math.PI*2); ctx.fill();
  // Last move indicator
  if(history.length>0){
    const last = history[history.length-1];
    if(last.r===r && last.c===c){
      ctx.fillStyle = '#0071e3';
      ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    }
  }
}

// Click
canvas.addEventListener('pointerdown', function(e){
  if(gameOver) return;
  if(mode==='ai' && turn!==playerColor) return;
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX-rect.left)/rect.width*boardPx;
  const sy = (e.clientY-rect.top)/rect.height*boardPx;
  const c = Math.round((sx-padding)/cellSize);
  const r = Math.round((sy-padding)/cellSize);
  if(r<0||r>=SIZE||c<0||c>=SIZE||grid[r][c]!==EMPTY) return;
  place(r,c);
  if(!gameOver && mode==='ai') setTimeout(aiMove, 150);
});

function place(r,c){
  grid[r][c] = turn;
  history.push({r,c,color:turn});
  if(checkWin(r,c,turn)){
    gameOver=true; winner=turn;
    endGame();
  } else if(history.length===SIZE*SIZE){
    gameOver=true; winner=0;
    endGame();
  } else {
    turn = turn===BLACK?WHITE:BLACK;
  }
  updateStatus(); draw();
}

function endGame(){
  if(winner){
    const isPlayerWin = mode==='pvp' || winner===playerColor;
    if(mode==='ai'){ isPlayerWin?stats.w++:stats.l++; }
    else { stats.w++; }
    document.getElementById('resultTitle').textContent = (winner===BLACK?'Black':'White')+' Wins!';
    document.getElementById('resultMsg').textContent = mode==='ai'?(winner===playerColor?'Great game!':'Better luck next time.'):'Congratulations!';
  } else {
    stats.d++;
    document.getElementById('resultTitle').textContent = 'Draw!';
    document.getElementById('resultMsg').textContent = 'The board is full. Well played!';
  }
  saveStats(); updateStatsUI();
  setTimeout(()=>document.getElementById('overlay').classList.add('show'), 500);
}

function hideOverlay(){ document.getElementById('overlay').classList.remove('show'); }
window.hideOverlay = hideOverlay;

function checkWin(r,c,p){
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for(const [dr,dc] of dirs){
    let count=1; const cells=[[r,c]];
    for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===p){count++;cells.push([nr,nc]);}else break;}
    for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===p){count++;cells.push([nr,nc]);}else break;}
    if(count>=5){cells.sort((a,b)=>a[0]-b[0]||a[1]-b[1]);winLine=cells;return true;}
  }
  return false;
}

// AI — minimax with alpha-beta
function aiMove(){
  if(gameOver) return;
  const aiColor = turn;
  const best = findBestMove(aiColor, diff);
  if(best) place(best[0], best[1]);
}

function findBestMove(aiColor, depth){
  const candidates = getCandidates();
  if(candidates.length===0) return [7,7];
  if(depth===1){
    // Easy: pick best scoring move with some randomness
    let best=null, bestScore=-Infinity;
    for(const [r,c] of candidates){
      const s = evalPos(r,c,aiColor) + Math.random()*50;
      if(s>bestScore){bestScore=s;best=[r,c];}
    }
    return best;
  }
  // Medium/Hard: minimax
  const maxDepth = depth===2?2:4;
  let best=null, bestScore=-Infinity;
  const sorted = candidates.map(([r,c])=>[r,c,evalPos(r,c,aiColor)+evalPos(r,c,aiColor===BLACK?WHITE:BLACK)]).sort((a,b)=>b[2]-a[2]).slice(0,15);
  for(const [r,c] of sorted){
    grid[r][c]=aiColor;
    if(checkWinSimple(r,c,aiColor)){grid[r][c]=EMPTY;return [r,c];}
    const s = minimax(maxDepth-1, false, -Infinity, Infinity, aiColor);
    grid[r][c]=EMPTY;
    if(s>bestScore){bestScore=s;best=[r,c];}
  }
  return best;
}

function minimax(depth,isMax,alpha,beta,aiColor){
  if(depth===0) return evaluate(aiColor);
  const opp = aiColor===BLACK?WHITE:BLACK;
  const cur = isMax?aiColor:opp;
  const cands = getCandidates().slice(0,10);
  if(cands.length===0) return 0;
  if(isMax){
    let val=-Infinity;
    for(const [r,c] of cands){
      grid[r][c]=cur;
      if(checkWinSimple(r,c,cur)){grid[r][c]=EMPTY;return 100000;}
      val=Math.max(val,minimax(depth-1,false,alpha,beta,aiColor));
      grid[r][c]=EMPTY;
      alpha=Math.max(alpha,val);
      if(beta<=alpha) break;
    }
    return val;
  } else {
    let val=Infinity;
    for(const [r,c] of cands){
      grid[r][c]=cur;
      if(checkWinSimple(r,c,cur)){grid[r][c]=EMPTY;return -100000;}
      val=Math.min(val,minimax(depth-1,true,alpha,beta,aiColor));
      grid[r][c]=EMPTY;
      beta=Math.min(beta,val);
      if(beta<=alpha) break;
    }
    return val;
  }
}

function getCandidates(){
  const set=new Set();
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    if(grid[r][c]!==EMPTY){
      for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===EMPTY) set.add(nr*SIZE+nc);
      }
    }
  }
  if(set.size===0) return [[7,7]];
  return [...set].map(v=>[Math.floor(v/SIZE),v%SIZE]);
}

function evalPos(r,c,color){
  let score=0;
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(const [dr,dc] of dirs){
    let cnt=1,open=0;
    for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===color)cnt++;else{if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===EMPTY)open++;break;}}
    for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===color)cnt++;else{if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===EMPTY)open++;break;}}
    if(cnt>=5)score+=100000;
    else if(cnt===4&&open===2)score+=10000;
    else if(cnt===4&&open===1)score+=1000;
    else if(cnt===3&&open===2)score+=1000;
    else if(cnt===3&&open===1)score+=100;
    else if(cnt===2&&open===2)score+=100;
    else if(cnt===2&&open===1)score+=10;
  }
  return score;
}

function evaluate(aiColor){
  let score=0;
  const opp=aiColor===BLACK?WHITE:BLACK;
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    if(grid[r][c]===aiColor) score+=evalPos(r,c,aiColor);
    else if(grid[r][c]===opp) score-=evalPos(r,c,opp)*1.1;
  }
  return score;
}

function checkWinSimple(r,c,p){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(const [dr,dc] of dirs){
    let cnt=1;
    for(let d=1;d<5;d++){const nr=r+dr*d,nc=c+dc*d;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===p)cnt++;else break;}
    for(let d=1;d<5;d++){const nr=r-dr*d,nc=c-dc*d;if(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&grid[nr][nc]===p)cnt++;else break;}
    if(cnt>=5) return true;
  }
  return false;
}

// Init
mode='pvp'; updateStatsUI(); newGame(); resize();
})();
</script>
<script src="../shared-leaderboard.js"></script>
</body>
</html>
