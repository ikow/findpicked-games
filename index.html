<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FindPicked Games - 经典游戏合集</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  min-height: 100vh;
}
.header {
  text-align: center;
  padding: 40px 20px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  border-bottom: 2px solid #00d4ff33;
}
.header h1 {
  font-size: 2.5em;
  background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff2d95);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.header p { color: #888; font-size: 1.1em; }
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
  padding: 40px 5%;
  max-width: 1400px;
  margin: 0 auto;
}
.game-card {
  background: #12121a;
  border: 1px solid #ffffff10;
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.3s ease;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
}
.game-card:hover {
  transform: translateY(-4px);
  border-color: #00d4ff44;
  box-shadow: 0 8px 32px #00d4ff15;
}
.game-thumb {
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4em;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
}
.game-info { padding: 20px; }
.game-info h3 { font-size: 1.2em; margin-bottom: 8px; }
.game-info p { color: #888; font-size: 0.9em; line-height: 1.5; }
.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75em;
  margin-top: 10px;
  margin-right: 6px;
  background: #00d4ff15;
  color: #00d4ff;
  border: 1px solid #00d4ff33;
}
.tag.hot { background: #ff2d9515; color: #ff2d95; border-color: #ff2d9533; }
.footer {
  text-align: center;
  padding: 30px;
  color: #555;
  font-size: 0.85em;
}
</style>
</head>
<body>
<div class="header">
  <h1>🎮 FindPicked Games</h1>
  <p>经典游戏，纯前端，即开即玩</p>
</div>
<div class="games-grid">
  <a class="game-card" href="./gomoku/">
    <div class="game-thumb">⚫</div>
    <div class="game-info">
      <h3>五子棋 Gomoku</h3>
      <p>经典五子棋，支持人机对战，5档AI难度，赛博朋克风格</p>
      <span class="tag">策略</span><span class="tag hot">AI对战</span>
    </div>
  </a>
</div>
<div class="footer">
  <p>game.findpicked.com · All games are open source and free to play</p>
</div>
</body>
</html>
