<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snake · FindPicked Games</title>
<meta name="description" content="Play Snake online for free. Eat the apple, grow longer, don't crash.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230071e3'/%3E%3Ctext x='16' y='22' font-size='18' fill='white' text-anchor='middle' font-family='system-ui'%3ES%3C/text%3E%3C/svg%3E">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #fafafa;
  --bg-card: #ffffff;
  --bg-hover: #f5f5f7;
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #86868b;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
  --snake-head: #1d1d1f;
  --snake-body: #3a3a3c;
  --food: #ff3b30;
  --leaf: #34c759;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: manipulation;
}

.app {
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 520px;
  margin: 0 auto;
  padding: 12px 16px 20px;
}

.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 44px;
  flex-shrink: 0;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.back {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  line-height: 1;
  color: var(--text-primary);
  text-decoration: none;
  transition: background 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}
.back:hover, .back:active { background: var(--bg-hover); }

.title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s ease, color 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.icon-btn svg { width: 18px; height: 18px; }

.scores {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  flex-shrink: 0;
}

.score-card {
  background: var(--bg-card);
  box-shadow: var(--shadow);
  border-radius: 14px;
  padding: 12px 18px;
  flex: 1;
  text-align: center;
}

.score-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
}

.score-value {
  font-size: 26px;
  font-weight: 700;
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.board-wrap {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 16px;
  position: relative;
}

.board {
  background: var(--bg-card);
  border-radius: 20px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 28px;
  text-align: center;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.overlay.visible { opacity: 1; pointer-events: auto; }

.overlay h2 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.overlay p {
  color: var(--text-secondary);
  font-size: 15px;
  line-height: 1.5;
  max-width: 280px;
}

.btn {
  height: 44px;
  padding: 0 24px;
  border-radius: 22px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s ease, transform 0.1s ease;
  -webkit-tap-highlight-color: transparent;
  margin-top: 8px;
}
.btn:hover { background: var(--accent-hover); }
.btn:active { transform: scale(0.97); }

.dpad {
  margin-top: 14px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 6px;
  width: 200px;
  height: 200px;
  align-self: center;
  flex-shrink: 0;
  user-select: none;
}

.dpad button {
  background: var(--bg-card);
  box-shadow: var(--shadow);
  border: none;
  border-radius: 14px;
  font-size: 20px;
  color: var(--text-primary);
  font-family: inherit;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, transform 0.1s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.dpad button:active { background: var(--bg-hover); transform: scale(0.94); }
.dpad .up { grid-column: 2; grid-row: 1; }
.dpad .left { grid-column: 1; grid-row: 2; }
.dpad .right { grid-column: 3; grid-row: 2; }
.dpad .down { grid-column: 2; grid-row: 3; }

.hint {
  margin-top: 12px;
  font-size: 12px;
  color: var(--text-tertiary);
  text-align: center;
  flex-shrink: 0;
}

@media (hover: hover) and (pointer: fine) {
  .dpad { display: none; }
}

@media (min-height: 720px) {
  .dpad { width: 220px; height: 220px; }
}
</style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <div class="nav-left">
      <a class="back" href="../" aria-label="Back to games">←</a>
      <div class="title">Snake</div>
    </div>
    <button class="icon-btn" id="pause-btn" aria-label="Pause">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="5" width="3.5" height="14" rx="1"/><rect x="13.5" y="5" width="3.5" height="14" rx="1"/></svg>
    </button>
  </nav>

  <div class="scores">
    <div class="score-card">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">Best</div>
      <div class="score-value" id="best">0</div>
    </div>
  </div>

  <div class="board-wrap" id="board-wrap">
    <div class="board" id="board">
      <canvas id="canvas"></canvas>
      <div class="overlay visible" id="overlay">
        <h2 id="overlay-title">Snake</h2>
        <p id="overlay-text">Use arrow keys or swipe to move. Eat the apple, grow longer, don't crash.</p>
        <button class="btn" id="action-btn">Start</button>
      </div>
    </div>
  </div>

  <div class="dpad" id="dpad" aria-label="Direction controls">
    <button class="up" data-dir="up" aria-label="Up">↑</button>
    <button class="left" data-dir="left" aria-label="Left">←</button>
    <button class="right" data-dir="right" aria-label="Right">→</button>
    <button class="down" data-dir="down" aria-label="Down">↓</button>
  </div>

  <p class="hint">Arrow keys · WASD · Space to pause</p>
</div>

<script>
(function () {
  const GRID = 20;
  const BASE_TICK = 140;
  const MIN_TICK = 70;
  const SPEEDUP = 3;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const boardWrap = document.getElementById('board-wrap');
  const board = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayText = document.getElementById('overlay-text');
  const actionBtn = document.getElementById('action-btn');
  const pauseBtn = document.getElementById('pause-btn');

  let cellSize = 0;
  let boardSize = 0;
  let snake, dir, nextDir, food, score, tickMs, timer;
  let state = 'idle'; // idle | running | paused | over
  let newBest = false;

  let best = parseInt(localStorage.getItem('snake.best') || '0', 10);
  bestEl.textContent = best;

  function resize() {
    const rect = boardWrap.getBoundingClientRect();
    const size = Math.floor(Math.min(rect.width, rect.height, 480));
    if (size <= 0) return;
    boardSize = size;
    board.style.width = size + 'px';
    board.style.height = size + 'px';
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(size * dpr);
    canvas.height = Math.round(size * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cellSize = size / GRID;
    draw();
  }

  function reset() {
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1, y:0};
    nextDir = dir;
    score = 0;
    tickMs = BASE_TICK;
    newBest = false;
    placeFood();
    updateScore();
  }

  function placeFood() {
    while (true) {
      const f = {
        x: Math.floor(Math.random() * GRID),
        y: Math.floor(Math.random() * GRID)
      };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) {
        food = f;
        return;
      }
    }
  }

  function updateScore() {
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('snake.best', String(best));
      newBest = true;
    }
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver();
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) return gameOver();
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      updateScore();
      placeFood();
      if (tickMs > MIN_TICK) {
        tickMs = Math.max(MIN_TICK, tickMs - SPEEDUP);
        restartTimer();
      }
    } else {
      snake.pop();
    }
    draw();
  }

  function gameOver() {
    clearInterval(timer);
    state = 'over';
    overlayTitle.textContent = 'Game over';
    overlayText.textContent =
      'You scored ' + score + (newBest && score > 0 ? '. A new best.' : '.');
    actionBtn.textContent = 'Play again';
    overlay.classList.add('visible');
    draw();
  }

  function startGame() {
    reset();
    state = 'running';
    overlay.classList.remove('visible');
    restartTimer();
    draw();
  }

  function pauseGame() {
    if (state !== 'running') return;
    clearInterval(timer);
    state = 'paused';
    overlayTitle.textContent = 'Paused';
    overlayText.textContent = 'Press space or tap resume to continue.';
    actionBtn.textContent = 'Resume';
    overlay.classList.add('visible');
  }

  function resumeGame() {
    if (state !== 'paused') return;
    state = 'running';
    overlay.classList.remove('visible');
    restartTimer();
  }

  function restartTimer() {
    clearInterval(timer);
    timer = setInterval(step, tickMs);
  }

  function onAction() {
    if (state === 'paused') resumeGame();
    else startGame();
  }

  function onPauseClick() {
    if (state === 'running') pauseGame();
    else if (state === 'paused') resumeGame();
    else startGame();
  }

  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function draw() {
    if (!boardSize) return;
    ctx.clearRect(0, 0, boardSize, boardSize);

    // subtle checker background
    ctx.fillStyle = 'rgba(0,0,0,0.015)';
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        if ((x + y) % 2 === 0) {
          ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }
      }
    }

    // food — an apple
    const fcx = food.x * cellSize + cellSize / 2;
    const fcy = food.y * cellSize + cellSize / 2;
    const fr = cellSize * 0.32;
    ctx.fillStyle = '#ff3b30';
    ctx.beginPath();
    ctx.arc(fcx, fcy, fr, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#34c759';
    ctx.beginPath();
    ctx.ellipse(fcx + fr * 0.35, fcy - fr * 0.85, fr * 0.34, fr * 0.18, -0.5, 0, Math.PI * 2);
    ctx.fill();

    // snake
    const pad = cellSize * 0.08;
    const r = cellSize * 0.22;
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      ctx.fillStyle = i === 0 ? '#1d1d1f' : '#3a3a3c';
      roundRect(
        seg.x * cellSize + pad,
        seg.y * cellSize + pad,
        cellSize - pad * 2,
        cellSize - pad * 2,
        r
      );
      ctx.fill();
    }

    // eye on head
    if (snake.length) {
      const head = snake[0];
      const hx = head.x * cellSize + cellSize / 2;
      const hy = head.y * cellSize + cellSize / 2;
      const er = cellSize * 0.07;
      const offset = cellSize * 0.18;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(hx + dir.x * offset - dir.y * offset, hy + dir.y * offset - dir.x * offset, er, 0, Math.PI * 2);
      ctx.arc(hx + dir.x * offset + dir.y * offset, hy + dir.y * offset + dir.x * offset, er, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function changeDir(d) {
    if (state !== 'running') return;
    if (d.x === -dir.x && d.y === -dir.y) return;
    if (d.x === dir.x && d.y === dir.y) return;
    nextDir = d;
  }

  const DIR_MAP = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
    ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
    w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0}
  };

  window.addEventListener('keydown', function (e) {
    const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (DIR_MAP[k]) {
      e.preventDefault();
      changeDir(DIR_MAP[k]);
    } else if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (state === 'running') pauseGame();
      else if (state === 'paused') resumeGame();
      else startGame();
    }
  });

  actionBtn.addEventListener('click', onAction);
  pauseBtn.addEventListener('click', onPauseClick);

  document.querySelectorAll('.dpad button').forEach(function (btn) {
    const name = btn.dataset.dir;
    const map = {up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}};
    const handler = function (e) {
      e.preventDefault();
      if (state === 'idle' || state === 'over') {
        startGame();
      } else if (state === 'paused') {
        resumeGame();
      }
      changeDir(map[name]);
    };
    btn.addEventListener('click', handler);
    btn.addEventListener('touchstart', handler, {passive: false});
  });

  // swipe on the board
  let touchStart = null;
  board.addEventListener('touchstart', function (e) {
    if (e.touches.length === 1) {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  }, {passive: true});
  board.addEventListener('touchend', function (e) {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    touchStart = null;
    if (Math.abs(dx) < 16 && Math.abs(dy) < 16) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      changeDir({x: dx > 0 ? 1 : -1, y: 0});
    } else {
      changeDir({x: 0, y: dy > 0 ? 1 : -1});
    }
  }, {passive: true});

  window.addEventListener('resize', resize);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', resize);
  }

  reset();
  resize();
})();
</script>
</body>
</html>
